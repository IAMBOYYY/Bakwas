  <body class="bg-[#FAF6F0] text-[#4A3E3D] selection:bg-pink-200 selection:text-pink-800 antialiased overflow-x-hidden">
    <style>
      #root { opacity: 0; visibility: hidden; }
      #root.site-revealed { opacity: 1; visibility: visible; transition: opacity 1s ease; }
      .candle-gate {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle at 50% 30%, #FFF6F2 0%, #FAF0F0 55%, #F5E4EC 100%);
        padding: 24px; text-align: center;
        transition: opacity 0.8s ease, visibility 0.8s ease;
        font-family: 'Poppins', sans-serif;
      }
      .candle-gate.gate-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .candle-gate-title {
        font-family: 'Dancing Script', cursive; font-size: 2.3rem; color: #C4708A; margin: 0 0 8px;
      }
      .candle-gate-subtitle { color: #4A3E3D; opacity: 0.8; margin: 0 0 22px; font-size: 1rem; min-height: 1.4em; }
      .candle-gate-canvas-wrap {
        width: min(78vw, 340px); aspect-ratio: 1 / 1; border-radius: 24px;
        background: radial-gradient(circle at 50% 40%, #FFF9F5 0%, #FDEDF1 100%);
        box-shadow: 0 12px 40px rgba(196, 112, 138, 0.18);
        cursor: pointer; touch-action: none; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
      }
      .candle-gate-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
      .candle-gate-dots { margin-top: 20px; display: flex; gap: 10px; }
      .candle-dot { width: 12px; height: 12px; border-radius: 50%; background: #F4A2C1; transition: all 0.3s ease; }
      .candle-dot.out { background: transparent; border: 2px solid #D8C8C8; }
    </style>
    <div class="candle-gate" id="candle-gate">
      <h1 class="candle-gate-title">Make a Wish, Norika! 🎂</h1>
      <p class="candle-gate-subtitle" id="candle-gate-subtitle">Tap the cake to blow out your candles ✨</p>
      <div class="candle-gate-canvas-wrap" id="cake3d-wrap"></div>
      <div class="candle-gate-dots" id="candle-dots"></div>
    </div>
    <div id="root"></div>

    <script>
      (function () {
        var gate = document.getElementById('candle-gate');
        var wrap = document.getElementById('cake3d-wrap');
        var subtitle = document.getElementById('candle-gate-subtitle');
        var dotsWrap = document.getElementById('candle-dots');
        var TOTAL = 5;
        var lit = [true, true, true, true, true];
        var litCount = TOTAL;
        var flameRefs = [];
        var puffFn = null;
        var cancelLoop = null;
        var onDragMove = null;

        for (var i = 0; i < TOTAL; i++) {
          var d = document.createElement('div');
          d.className = 'candle-dot';
          d.id = 'dot-' + i;
          dotsWrap.appendChild(d);
        }

        function updateSubtitle() {
          if (litCount === 0) subtitle.textContent = 'Yay! Wish made! 🎉';
          else if (litCount === 1) subtitle.textContent = 'Just 1 more candle!';
          else subtitle.textContent = 'Tap to blow out ' + litCount + ' more candles ✨';
        }
        updateSubtitle();

        function revealSite() {
          var root = document.getElementById('root');
          root.classList.add('site-revealed');
          gate.classList.add('gate-hidden');
          setTimeout(function () {
            gate.style.display = 'none';
            if (cancelLoop) cancelLoop();
          }, 900);
        }

        function playPoof() {
          try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var bufferSize = ctx.sampleRate * 0.15;
            var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            var data = buffer.getChannelData(0);
            for (var i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            var src = ctx.createBufferSource();
            src.buffer = buffer;
            var gain = ctx.createGain();
            gain.gain.value = 0.18;
            var filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200;
            src.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            src.start();
          } catch (e) {}
        }

        function blowNext() {
          if (litCount <= 0) return;
          var idx = -1;
          for (var i = 0; i < TOTAL; i++) { if (lit[i]) { idx = i; break; } }
          if (idx === -1) return;
          lit[idx] = false;
          litCount--;
          document.getElementById('dot-' + idx).classList.add('out');
          if (flameRefs[idx]) flameRefs[idx].visible = false;
          if (puffFn) puffFn(idx);
          playPoof();
          updateSubtitle();
          if (litCount === 0) setTimeout(revealSite, 700);
        }

        var TAP_THRESHOLD = 10;
        var downX = 0, downY = 0, isDown = false, moved = false;

        function onDown(e) {
          isDown = true; moved = false;
          var p = e.touches ? e.touches[0] : e;
          downX = p.clientX; downY = p.clientY;
          if (onDragMove) onDragMove.lastX = undefined;
        }
        function onMove(e) {
          if (!isDown) return;
          var p = e.touches ? e.touches[0] : e;
          if (Math.abs(p.clientX - downX) > TAP_THRESHOLD || Math.abs(p.clientY - downY) > TAP_THRESHOLD) moved = true;
          if (typeof onDragMove === 'function') onDragMove(p.clientX);
        }
        function onUp(e) {
          if (isDown && !moved) blowNext();
          isDown = false;
        }
        wrap.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        wrap.addEventListener('touchstart', onDown, { passive: true });
        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onUp);

        function init3D() {
          if (typeof THREE === 'undefined') return false;
          try {
            var scene = new THREE.Scene();
            var camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
            var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            wrap.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            var key = new THREE.DirectionalLight(0xfff2e6, 0.9); key.position.set(3, 5, 4); scene.add(key);
            var fillL = new THREE.DirectionalLight(0xffe6f0, 0.4); fillL.position.set(-4, 2, -3); scene.add(fillL);

            var cake = new THREE.Group();
            function tierMesh(radius, height, y, color) {
              var geo = new THREE.CylinderGeometry(radius, radius, height, 48);
              var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.55, metalness: 0.05 });
              var m = new THREE.Mesh(geo, mat);
              m.position.y = y + height / 2;
              return m;
            }
            cake.add(tierMesh(0.74, 0.04, 0, 0xFAFAF6));
            cake.add(tierMesh(0.6, 0.4, 0.04, 0xF4A2C1));
            cake.add(tierMesh(0.46, 0.3, 0.44, 0xFFFAF5));

            var swirlGeo = new THREE.ConeGeometry(0.22, 0.26, 32);
            var swirlMat = new THREE.MeshStandardMaterial({ color: 0xFFC0CB, roughness: 0.5 });
            var swirl = new THREE.Mesh(swirlGeo, swirlMat);
            swirl.position.y = 0.74 + 0.13;
            cake.add(swirl);

            var candleColors = [0xFFD6E0, 0xD8D2F0, 0xFFD5B3, 0xC8EBF0, 0xE0BE6E];
            var flameMat = new THREE.MeshStandardMaterial({ color: 0xFFB74D, emissive: 0xFF9800, emissiveIntensity: 0.7 });
            var radius = 0.32;
            flameRefs = [];
            candleColors.forEach(function (color, i) {
              var angle = (i / candleColors.length) * Math.PI * 2;
              var x = radius * Math.cos(angle), z = radius * Math.sin(angle);
              var stickGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.2, 12);
              var stickMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
              var stick = new THREE.Mesh(stickGeo, stickMat);
              stick.position.set(x, 0.74 + 0.1, z);
              cake.add(stick);
              var flameGeo = new THREE.ConeGeometry(0.015, 0.04, 10);
              var flame = new THREE.Mesh(flameGeo, flameMat);
              flame.position.set(x, 0.74 + 0.2 + 0.02, z);
              cake.add(flame);
              flameRefs[i] = flame;
            });

            cake.position.y = -0.5;
            scene.add(cake);
            camera.position.set(1.3, 1.0, 1.3);
            camera.lookAt(0, 0, 0);

            function resize() {
              var w = wrap.clientWidth, h = wrap.clientHeight;
              if (!w || !h) return;
              renderer.setSize(w, h);
              camera.aspect = w / h;
              camera.updateProjectionMatrix();
            }
            window.addEventListener('resize', resize);
            resize();

            var rotation = 0.4;
            onDragMove = function (clientX) {
              if (onDragMove.lastX === undefined) { onDragMove.lastX = clientX; return; }
              rotation += (clientX - onDragMove.lastX) * 0.01;
              onDragMove.lastX = clientX;
            };

            var puffs = [];
            puffFn = function (idx) {
              var fRef = flameRefs[idx];
              if (!fRef) return;
              var geo = new THREE.SphereGeometry(0.02, 8, 8);
              var mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
              var p = new THREE.Mesh(geo, mat);
              p.position.copy(fRef.position);
              cake.add(p);
              puffs.push({ mesh: p, age: 0 });
            };

            var running = true;
            function animate() {
              if (!running) return;
              requestAnimationFrame(animate);
              rotation += 0.004;
              cake.rotation.y = rotation;
              for (var i = puffs.length - 1; i >= 0; i--) {
                var pu = puffs[i];
                pu.age += 0.02;
                pu.mesh.scale.setScalar(1 + pu.age * 6);
                pu.mesh.material.opacity = Math.max(0, 0.7 - pu.age * 1.2);
                pu.mesh.position.y += 0.004;
                if (pu.age > 0.8) { cake.remove(pu.mesh); puffs.splice(i, 1); }
              }
              renderer.render(scene, camera);
            }
            animate();
            cancelLoop = function () { running = false; };
            return true;
          } catch (e) {
            return false;
          }
        }

        function initFallback() {
          wrap.innerHTML = '';
          wrap.style.gap = '10px';
          wrap.style.flexWrap = 'wrap';
          wrap.style.fontSize = '2.2rem';
          flameRefs = [];
          for (var i = 0; i < TOTAL; i++) {
            (function (idx) {
              var span = document.createElement('span');
              span.textContent = '🕯️';
              span.style.transition = 'transform .3s ease';
              wrap.appendChild(span);
              flameRefs[idx] = {
                get visible() { return true; },
                set visible(v) { span.textContent = v ? '🕯️' : '💨'; span.style.transform = v ? 'scale(1)' : 'scale(0.85)'; }
              };
            })(i);
          }
        }
